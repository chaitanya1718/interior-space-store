apiVersion: apps/v1
kind: Deployment
metadata:
  name: furniture-store

spec:
  replicas: 2

  selector:
    matchLabels:
      app: furniture-store

  template:
    metadata:
      labels:
        app: furniture-store

    spec:
      containers:
        - name: furniture-store
          image: chaitanyag18/furniture-store:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 80
